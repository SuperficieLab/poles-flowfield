<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Heat Map · Sites</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#000; overflow:hidden; font-family:'SF Mono','Fira Mono',monospace; display:flex; align-items:center; justify-content:center; width:100vw; height:100vh; }
    canvas { display:block; flex-shrink:0; }

    #panel {
      position:fixed; bottom:28px; left:50%; transform:translateX(-50%);
      display:flex; align-items:center; gap:18px; padding:14px 22px;
      background:rgba(6,6,10,0.78); border:1px solid rgba(255,224,32,0.18);
      border-radius:14px; backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
      box-shadow:0 0 32px rgba(255,224,32,0.06); user-select:none;
      transition:opacity 0.3s; white-space:nowrap;
    }
    #panel.hidden { opacity:0; pointer-events:none; }
    .ctrl { display:flex; flex-direction:column; align-items:center; gap:5px; min-width:72px; }
    .ctrl label { font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,224,32,0.5); }
    .ctrl .val  { font-size:11px; color:rgba(255,224,32,0.9); min-width:36px; text-align:center; }
    input[type=range] { -webkit-appearance:none; appearance:none; width:72px; height:2px; background:rgba(255,224,32,0.2); border-radius:2px; outline:none; cursor:pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:#ffe020; box-shadow:0 0 6px rgba(255,224,32,0.8); cursor:pointer; }
    .divider { width:1px; height:40px; background:rgba(255,224,32,0.12); flex-shrink:0; }
    .btn { width:32px; height:32px; border:1px solid rgba(255,224,32,0.25); border-radius:8px; background:transparent; color:rgba(255,224,32,0.7); font-size:14px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background 0.15s,color 0.15s; flex-shrink:0; }
    .btn:hover  { background:rgba(255,224,32,0.12); color:#ffe020; }
    .btn.active { background:rgba(255,224,32,0.18); color:#ffe020; }
    @keyframes recblink { 50% { opacity:0.3; } }
    .btn.recording { color:#ff4444; border-color:rgba(255,68,68,0.6); animation:recblink 1s step-end infinite; }

    #hint { position:fixed; bottom:10px; left:50%; transform:translateX(-50%); font-size:10px; letter-spacing:0.1em; color:rgba(255,224,32,0.2); pointer-events:none; white-space:nowrap; }
    #hint.hidden { opacity:0; }

    #topBar {
      position:fixed; top:18px; left:50%; transform:translateX(-50%);
      display:flex; gap:8px; z-index:100; align-items:center;
      background:rgba(6,6,10,0.72); border:1px solid rgba(255,224,32,0.15);
      border-radius:20px; padding:6px 12px; backdrop-filter:blur(12px);
      max-width:90vw; flex-wrap:wrap; justify-content:center;
    }
    .mode-link {
      background:transparent; border:1px solid rgba(255,224,32,0.15); border-radius:14px;
      color:rgba(255,224,32,0.35); font-family:inherit; font-size:10px;
      letter-spacing:0.16em; text-transform:uppercase; padding:5px 14px;
      cursor:pointer; text-decoration:none; display:flex; align-items:center;
      transition:color 0.15s;
    }
    .mode-link:hover { color:rgba(255,224,32,0.7); }
    .mode-link.active { color:rgba(255,224,32,0.95); border-color:rgba(255,224,32,0.5); }
    .top-sep { width:1px; height:16px; background:rgba(255,224,32,0.12); }
    .load-btn {
      background:transparent; border:1px solid rgba(255,224,32,0.3); border-radius:14px;
      color:rgba(255,224,32,0.7); font-family:inherit; font-size:10px;
      letter-spacing:0.12em; text-transform:uppercase; padding:5px 14px;
      cursor:pointer; transition:background 0.15s,color 0.15s;
    }
    .load-btn:hover { background:rgba(255,224,32,0.12); color:#ffe020; }
    .dataset-tag {
      display:flex; align-items:center; gap:6px; padding:4px 10px;
      border:1px solid rgba(255,224,32,0.2); border-radius:12px;
      font-size:9px; letter-spacing:0.1em; color:rgba(255,224,32,0.6);
      text-transform:uppercase; max-width:180px; overflow:hidden;
    }
    .dataset-tag .dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .dataset-tag .name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .dataset-tag .rm { cursor:pointer; opacity:0.5; flex-shrink:0; font-size:11px; line-height:1; }
    .dataset-tag .rm:hover { opacity:1; }

    #dropOverlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7);
      border:2px dashed rgba(255,224,32,0.5); border-radius:16px;
      display:none; align-items:center; justify-content:center; z-index:999;
      font-size:18px; letter-spacing:0.2em; color:rgba(255,224,32,0.7);
      text-transform:uppercase; pointer-events:none;
    }
    body.dragging #dropOverlay { display:flex; }
  </style>
</head>
<body>
<canvas id="canvas"></canvas>
<div id="dropOverlay">Drop CSV files</div>

<div id="topBar">
  <a class="mode-link" href="index.html?scene=pacifico">flow</a>
  <div class="top-sep"></div>
  <button class="mode-link"        id="btnHeat"    title="Heat mode">heat</button>
  <button class="mode-link"        id="btnContour" title="Contour mode">contour</button>
  <button class="mode-link active" id="btnMixed"   title="Mixed mode">mixed</button>
  <button class="mode-link"        id="btnDebug"   title="Debug: raw points">points</button>
  <div class="top-sep"></div>
  <button class="load-btn" id="btnLoad">+ load csv</button>
  <input type="file" id="csvInput" accept=".csv,text/csv" multiple style="display:none">
  <div id="datasetTags"></div>
</div>

<div id="panel">
  <button class="btn active" id="btnPlay" title="Play reveal (Space)">&#x25B6;</button>
  <button class="btn" id="btnReset" title="Reset">&#x21BA;</button>
  <div class="divider"></div>
  <button class="btn active" id="btnOneShot" title="Play reveal then breathe">1×</button>
  <button class="btn" id="btnFreeze" title="Skip to end and hold">0×</button>
  <div class="divider"></div>
  <div class="ctrl"><label>Radius</label>   <input type="range" id="sRadius"    min="5"   max="120"  step="1"    value="10">  <span class="val" id="vRadius">15</span></div>
  <div class="ctrl"><label>Intensity</label><input type="range" id="sIntensity" min="0.1" max="5.0"  step="0.1"  value="1.5"> <span class="val" id="vIntensity">1.5</span></div>
  <div class="ctrl"><label>Speed</label>    <input type="range" id="sSpeed"     min="0.1" max="3.0"  step="0.1"  value="1.0"> <span class="val" id="vSpeed">1.5×</span></div>
  <div class="ctrl"><label>Heat α</label>   <input type="range" id="sAlphaHeat"    min="0"   max="1"   step="0.05" value="0.85"> <span class="val" id="vAlphaHeat">85%</span></div>
  <div class="ctrl"><label>Heat band</label><input type="range" id="sBandHeat"     min="5"   max="150" step="5"    value="45">  <span class="val" id="vBandHeat">45</span></div>
  <div class="ctrl"><label>Ctr α</label>   <input type="range" id="sAlphaContour" min="0"   max="1"   step="0.05" value="0.20"> <span class="val" id="vAlphaContour">20%</span></div>
  <div class="ctrl"><label>Ctr band</label><input type="range" id="sBandContour"   min="0.2" max="4"   step="0.1"  value="0.8"> <span class="val" id="vBandContour">0.8</span></div>
  <div class="ctrl"><label>Bg</label>       <input type="range" id="sBgOp"      min="0"   max="1"    step="0.05" value="1.0"> <span class="val" id="vBgOp">100%</span></div>
  <div class="divider"></div>
  <button class="btn" id="btnRecord"   title="Record (V)">&#x23FA;</button>
  <button class="btn" id="btnExport"   title="Export PNG (E)">&#x2B07;</button>
</div>

<div id="hint" class="hidden">Space — play/pause · R — restart · E — export · V — record · H — hide UI · M — map · Drop CSV to load</div>

<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = Math.min(window.innerWidth,  1920);
let H = canvas.height = Math.min(window.innerHeight, 1080);

// ─── Map projection (Robinson) ───────────────────────────────────────────────
// MAPA_BASE.png is a Robinson projection world map.
// Tables from Robinson (1974): parallel length and distance-from-equator
// at every 5° latitude, 0°→90°.
const RPLEN = [1.0000,0.9986,0.9954,0.9900,0.9822,0.9730,0.9600,0.9427,
               0.9216,0.8962,0.8679,0.8350,0.7986,0.7597,0.7186,0.6732,
               0.6213,0.5722,0.5322];
const RPDFE = [0.0000,0.0620,0.1240,0.1860,0.2480,0.3100,0.3720,0.4340,
               0.4958,0.5571,0.6176,0.6769,0.7346,0.7903,0.8435,0.8936,
               0.9394,0.9761,1.0000];
const ROB_CENTER = -60;
const ROB_EW = 0.500;
const ROB_PH = 0.451;
const ROB_CY = 0.54;

// Sinusoidal CSV projection → lat/lon
const PROJ_SCALE = 94006.68;
const PROJ_LON0  = -62;

function projToLatLon(projX, projY) {
  const lat = projY / PROJ_SCALE;
  const lon = projX / (PROJ_SCALE * Math.cos(lat * Math.PI / 180)) + PROJ_LON0;
  return { lat, lon };
}

function robinsonNorm(lon, lat) {
  const absLat = Math.abs(lat);
  const i = Math.min(17, Math.floor(absLat / 5));
  const t = (absLat % 5) / 5;
  const plen = RPLEN[i] + (RPLEN[i+1] - RPLEN[i]) * t;
  const pdfe = RPDFE[i] + (RPDFE[i+1] - RPDFE[i]) * t;
  return [((lon - ROB_CENTER) / 180) * plen, (lat >= 0 ? 1 : -1) * pdfe];
}

function latLonToCanvas(lon, lat) {
  if (!bgW) return [W/2, H/2];
  const [rx, ry] = robinsonNorm(lon, lat);
  return [bgX + bgW/2 + rx * ROB_EW * bgW,
          bgY + bgH * ROB_CY - ry * ROB_PH * bgH];
}

// ─── Background ─────────────────────────────────────────────────────────────
const bgImg = new Image();
bgImg.src = './MAPA_BASE.png';
let bgX=0, bgY=0, bgW=0, bgH=0, bgOpacity=1.0, bgVisible=true;

function initBg() {
  const margin=40, ar=bgImg.naturalWidth/bgImg.naturalHeight;
  const fw=W-margin*2, fh=H-margin*2;
  if (ar > fw/fh) { bgW=fw; bgH=fw/ar; } else { bgH=fh; bgW=fh*ar; }
  bgX=(W-bgW)/2; bgY=(H-bgH)/2;
}
bgImg.onload = () => initBg();

function drawBg() {
  if (!bgVisible||!bgImg.complete||!bgImg.naturalWidth) return;
  if (!bgW) initBg();
  ctx.save(); ctx.globalAlpha=bgOpacity; ctx.drawImage(bgImg,bgX,bgY,bgW,bgH); ctx.restore();
}

// ─── Dataset registry ────────────────────────────────────────────────────────
const PALETTE_COLORS = [
  '#ffe020','#ff6040','#40c8ff','#80ff40','#ff40c8','#40ffb0','#ff8020','#c040ff'
];
let datasets = []; // [{name, color, latlon: [{lat,lon}], weights: Float32Array, phase: Float32Array}]
let globalRevealFrame = 0;
let revealActive = false;
let paused = true;
let animFrame = 0;
let freezeMode = true;     // true = reveal then fade out (1×); false = skip to end and hold (0×)
let freezeActive = false;  // true while fading out after reveal
let fadedOut = false;      // true once fade is complete — holds at empty
let fadeOutAlpha = 1.0;    // 1→0 during fade out
const ripples = [];
const MAX_RIPPLES = 12;
const REVEAL_FRAMES_PER_POINT = 40; // frames to reveal each point (~0.67s at 60fps)
const REVEAL_OVERLAP = 0.3; // fraction of overlap between consecutive points

// ─── Heat grid ───────────────────────────────────────────────────────────────
const HW = W, HH = H; // always match the actual canvas — no scaling distortion
const heatGrid   = new Float32Array(HW*HH);
const contourGrid = new Float32Array(HW*HH);
const contourTmp  = new Float32Array(HW*HH);
const heatColorR = new Float32Array(HW*HH);
const heatColorG = new Float32Array(HW*HH);
const heatColorB = new Float32Array(HW*HH);
const blurTmp    = new Float32Array(HW*HH);

// Separable box blur on a Float32Array grid (tmp is scratch space, same size as src)
function boxBlur(src, w, h, r, tmp) {
  tmp = tmp || blurTmp;
  for (let y=0;y<h;y++) {
    let sum=0, cnt=0;
    for (let d=-r;d<=r;d++) { const nx=d; if(nx>=0&&nx<w){sum+=src[y*w+nx];cnt++;} }
    for (let x=0;x<w;x++) {
      if(x-r-1>=0) { sum-=src[y*w+x-r-1]; cnt--; }
      if(x+r<w)    { sum+=src[y*w+x+r];   cnt++; }
      tmp[y*w+x]=sum/cnt;
    }
  }
  for (let x=0;x<w;x++) {
    let sum=0, cnt=0;
    for (let d=-r;d<=r;d++) { const ny=d; if(ny>=0&&ny<h){sum+=tmp[ny*w+x];cnt++;} }
    for (let y=0;y<h;y++) {
      if(y-r-1>=0) { sum-=tmp[(y-r-1)*w+x]; cnt--; }
      if(y+r<h)    { sum+=tmp[(y+r)*w+x];   cnt++; }
      src[y*w+x]=sum/cnt;
    }
  }
}
// Three box-blur passes ≈ Gaussian — eliminates periodic moiré artifacts
function gaussianBlur(src, w, h, r, tmp) {
  boxBlur(src, w, h, r, tmp);
  boxBlur(src, w, h, r, tmp);
  boxBlur(src, w, h, r, tmp);
}

const heatCanvas = document.createElement('canvas');
heatCanvas.width=HW; heatCanvas.height=HH;
const heatCtx = heatCanvas.getContext('2d');
const heatImg = heatCtx.createImageData(HW, HH);

// Contour canvas — rendered at full screen resolution (no upscaling)
const contourCanvas = document.createElement('canvas');
contourCanvas.width = W; contourCanvas.height = H;
const contourCtx = contourCanvas.getContext('2d');
let contourImg = contourCtx.createImageData(W, H);

// Thermal palette
const thermalPal = new Uint8ClampedArray(256*4);
(function(){
  const stops=[
    [0,   [0,  0,   0,   0  ]],
    [25,  [0,  0,   100, 100]],
    [70,  [0,  40,  200, 180]],
    [125, [0,  180, 180, 220]],
    [170, [80, 220, 60,  240]],
    [210, [220,220, 0,   250]],
    [238, [255,100, 0,   255]],
    [255, [255,20,  20,  255]],
  ];
  for (let v=0;v<256;v++) {
    let s0=stops[0], s1=stops[stops.length-1];
    for (let j=0;j<stops.length-1;j++) {
      if (v>=stops[j][0]&&v<=stops[j+1][0]){ s0=stops[j];s1=stops[j+1];break; }
    }
    const t=(v-s0[0])/Math.max(1,s1[0]-s0[0]);
    thermalPal[v*4+0]=s0[1][0]+(s1[1][0]-s0[1][0])*t;
    thermalPal[v*4+1]=s0[1][1]+(s1[1][1]-s0[1][1])*t;
    thermalPal[v*4+2]=s0[1][2]+(s1[1][2]-s0[1][2])*t;
    thermalPal[v*4+3]=s0[1][3]+(s1[1][3]-s0[1][3])*t;
  }
})();

let renderMode = 'mixed'; // 'heat' | 'contour' | 'mixed' | 'debug'

// ─── Params ──────────────────────────────────────────────────────────────────
const P = { radius:10, intensity:1.5, speed:1.0, alphaHeat:0.85, alphaContour:0.20, bandHeat:45, bandContour:0.8 };

// Rebuild the heat grid from current dataset weights
function rebuildHeat() {
  if (!bgW) return; // background not yet loaded — positions would be wrong
  heatGrid.fill(0);

  // Convert screen-pixel radius to grid cells independently for each axis.
  // Using both HW/W and HH/H ensures the kernel stays circular even when
  // the grid cells aren't perfectly square on screen.
  const rX = Math.ceil(P.radius * HW / W);
  const rY = Math.ceil(P.radius * HH / H);

  for (const ds of datasets) {
    for (let pi = 0; pi < ds.latlon.length; pi++) {
      const w = ds.weights[pi];
      if (w <= 0) continue;

      // Pulse only during reveal — settles to full weight once animation is done
      const pulse = revealActive
        ? 0.55 + 0.45 * Math.sin(animFrame * 0.04 * P.speed + ds.phase[pi])
        : 1.0;
      const { lat, lon } = ds.latlon[pi];
      const [rx, ry] = robinsonNorm(lon, lat);
      // Map Robinson coords to canvas pixels (same as latLonToCanvas)
      const hx = (bgX + bgW / 2 + rx * ROB_EW * bgW) | 0;
      const hy = (bgY + bgH * ROB_CY - ry * ROB_PH * bgH) | 0;
      if (hx < 0 || hx >= HW || hy < 0 || hy >= HH) continue;

      // Gaussian kernel — normalize dx/dy by their axis radius so the
      // falloff distance is always 1.0 at the edge, keeping a true circle.
      for (let dy = -rY; dy <= rY; dy++) {
        for (let dx = -rX; dx <= rX; dx++) {
          const nhx = hx + dx, nhy = hy + dy;
          if (nhx < 0 || nhx >= HW || nhy < 0 || nhy >= HH) continue;
          const normDist = Math.hypot(dx / rX, dy / rY); // 0–1 normalized
          if (normDist > 1) continue;
          const falloff = Math.exp(-2.5 * normDist * normDist) * w * pulse * P.intensity;
          heatGrid[nhy * HW + nhx] += falloff;
        }
      }
    }
  }

  // Blur radius scales with the kernel so small radii don't look blocky
  const blurR = Math.max(4, Math.round(Math.max(rX, rY) * 0.8));
  boxBlur(heatGrid, HW, HH, blurR);
}

function renderHeatmap() {
  if (renderMode === 'contour' || renderMode === 'mixed') renderContour();
  if (renderMode === 'heat'    || renderMode === 'mixed') renderThermal();
}

// Precomputed gamma LUT: maps linear 0–255 → palette index with power curve 0.38
// Avoids per-pixel Math.pow in the render loop.
const THERMAL_LUT = new Uint8Array(256);
(function(){ for (let i=0;i<256;i++) THERMAL_LUT[i] = Math.pow(i/255, 0.38) * 255 | 0; })();

function renderThermal() {
  const d = heatImg.data;
  const scale = P.bandHeat;
  for (let i=0;i<HW*HH;i++) {
    const v = THERMAL_LUT[Math.min(255, heatGrid[i] * scale | 0)];
    d[i*4+0]=thermalPal[v*4+0];
    d[i*4+1]=thermalPal[v*4+1];
    d[i*4+2]=thermalPal[v*4+2];
    d[i*4+3]=thermalPal[v*4+3];
  }
  heatCtx.putImageData(heatImg, 0, 0);
}

// Depth/topo map contour renderer
const CONTOUR_LEVELS = [0.20, 0.65, 1.40, 2.60];

// Filled elevation bands — very subtle fills, almost invisible per step
// so band boundaries are imperceptible and colors accumulate gently toward center
const CONTOUR_BAND_FILLS = [
  null,                        // below all levels — fully transparent
  [210, 198, 172,  16],       // 0.20–0.65
  [198, 178, 140,  28],       // 0.65–1.40
  [178, 145,  95,  40],       // 1.40–2.60
  [152, 108,  50,  52],       // above 2.60
];

// Warm yellow — sits in the thermal palette's mid-high range
const CONTOUR_LINE_COLOR = [255, 210, 55, 190];

function renderContour() {
  if (contourImg.width !== W || contourImg.height !== H) {
    contourCanvas.width = W; contourCanvas.height = H;
    contourImg = contourCtx.createImageData(W, H);
  }
  const d = contourImg.data;
  d.fill(0);
  if (!bgW) { contourCtx.putImageData(contourImg, 0, 0); return; }

  const x0 = Math.ceil(bgX) + 1, x1 = Math.floor(bgX + bgW) - 1;
  const y0 = Math.ceil(bgY) + 1, y1 = Math.floor(bgY + bgH) - 1;

  // Pass 1 — heatGrid is now in canvas pixel space (HW=W, HH=H), so copy 1:1.
  // No bilinear resampling needed — each screen pixel maps directly to a grid cell.
  for (let sy = y0; sy <= y1; sy++) {
    for (let sx = x0; sx <= x1; sx++) {
      contourGrid[sy * W + sx] = heatGrid[sy * HW + sx];
    }
  }


  // Pass 2 — filled elevation bands + anti-aliased contour lines on top.
  const LINE_HALF = 1.2;

  for (let sy = y0; sy <= y1; sy++) {
    for (let sx = x0; sx <= x1; sx++) {
      const si = sy * W + sx;
      const v  = contourGrid[si] * P.bandContour;

      // Which elevation band is this pixel in?
      let band = 0;
      for (let li = 0; li < CONTOUR_LEVELS.length; li++) {
        if (v >= CONTOUR_LEVELS[li]) band = li + 1;
      }

      let r = 0, g = 0, b = 0, a = 0;

      // Anti-aliased line: avoid sqrt on every pixel — compare squared distances,
      // only call sqrt on the few pixels that actually land on a line.
      const dx     = (contourGrid[si + 1] - contourGrid[si - 1]) * 0.5;
      const dy     = (contourGrid[si + W] - contourGrid[si - W]) * 0.5;
      const gradSq = dx * dx + dy * dy;
      if (gradSq >= 1e-8) {
        const LH2 = LINE_HALF * LINE_HALF;
        let minPdSq = LH2;
        for (let li = 0; li < CONTOUR_LEVELS.length; li++) {
          const diff = v - CONTOUR_LEVELS[li];
          const pdSq = (diff * diff) / gradSq;
          if (pdSq < minPdSq) minPdSq = pdSq;
        }
        if (minPdSq < LH2) {
          const t  = 1 - Math.sqrt(minPdSq) / LINE_HALF;
          const lc = CONTOUR_LINE_COLOR;
          r = (r + (lc[0] - r) * t) | 0;
          g = (g + (lc[1] - g) * t) | 0;
          b = (b + (lc[2] - b) * t) | 0;
          a = Math.min(255, a + ((lc[3] - a) * t + 0.5) | 0);
        }
      }

      if (a > 0) {
        const pi = si * 4;
        d[pi] = r; d[pi+1] = g; d[pi+2] = b; d[pi+3] = a;
      }
    }
  }
  contourCtx.putImageData(contourImg, 0, 0);
}

// ─── Reveal animation ────────────────────────────────────────────────────────
function totalPoints() { return datasets.reduce((s,d)=>s+d.latlon.length,0); }

function allPointsFlat() {
  const out = [];
  for (const ds of datasets) {
    for (let i=0;i<ds.latlon.length;i++) out.push({ds, i});
  }
  return out;
}

function updateWeights(frame) {
  const flat = allPointsFlat();
  const n = flat.length;
  if (n===0) return;
  const step = REVEAL_FRAMES_PER_POINT * (1 - REVEAL_OVERLAP);
  const totalFrames = step * (n - 1) + REVEAL_FRAMES_PER_POINT;

  for (let pi=0; pi<n; pi++) {
    const {ds, i} = flat[pi];
    const start = pi * step;
    const progress = Math.min(1, Math.max(0, (frame - start) / REVEAL_FRAMES_PER_POINT));
    // Ease in-out
    const w = progress < 0.5 ? 2*progress*progress : 1-Math.pow(-2*progress+2,2)/2;
    ds.weights[i] = w;
  }
  return totalFrames;
}

// ─── Main loop ───────────────────────────────────────────────────────────────
let uiVisible = true;
let needsRebuild = false;

function drawRipples() {
  if (!bgW || ripples.length === 0) return;
  ctx.save();
  if (renderMode === 'contour') {
    for (const rip of ripples) {
      const alpha = rip.alpha * (1 - rip.r / rip.maxR);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#b09070';
      ctx.beginPath();
      ctx.arc(rip.x, rip.y, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    ctx.lineWidth = 1.5;
    for (const rip of ripples) {
      ctx.strokeStyle = rip.color;
      ctx.globalAlpha = rip.alpha * (1 - rip.r / rip.maxR);
      ctx.shadowColor = rip.color;
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(rip.x, rip.y, rip.r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

function loop() {
  animFrame++;

  if (!paused && revealActive) {
    const totalFrames = updateWeights(globalRevealFrame);
    globalRevealFrame++;
    if (globalRevealFrame > totalFrames) {
      revealActive = false;
      paused = true;
      btnPlay.textContent = '▶';
      btnPlay.classList.remove('active');
      if (freezeMode) freezeActive = true;
    }
    needsRebuild = true;
  }

  // Keep animating during reveal
  if (revealActive && animFrame % 2 === 0) needsRebuild = true;

  // Fade out after reveal ends in 1× mode, then hold at empty
  if (freezeActive) {
    fadeOutAlpha -= 0.004; // ~4s fade at 60fps
    if (fadeOutAlpha <= 0) {
      fadeOutAlpha = 0;
      freezeActive = false;
      fadedOut = true;
    }
    needsRebuild = true;
  }

  if (needsRebuild) {
    rebuildHeat();
    renderHeatmap();
    needsRebuild = false;
  }

  // Spawn ripples from random active sites
  if (revealActive && ripples.length < MAX_RIPPLES && animFrame % 40 === 0) {
    const activeSites = [];
    for (const ds of datasets)
      for (let i = 0; i < ds.latlon.length; i++)
        if (ds.weights[i] > 0.3) activeSites.push({ds, i});
    if (activeSites.length > 0) {
      const pick = activeSites[(Math.random() * activeSites.length) | 0];
      const [cx, cy] = latLonToCanvas(pick.ds.latlon[pick.i].lon, pick.ds.latlon[pick.i].lat);
      ripples.push({x: cx, y: cy, r: 1, maxR: 8 + Math.random() * 10, alpha: 0.3, color: pick.ds.color});
    }
  }

  // Update ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    ripples[i].r += 0.5;
    if (ripples[i].r >= ripples[i].maxR) ripples.splice(i, 1);
  }

  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  drawBg();

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  if (bgW) {
    // After 1× reveal: fade out then hold at empty
    const breathe = fadedOut ? 0 : freezeActive ? fadeOutAlpha : 1.0;

    if (renderMode === 'contour') {
      ctx.save();
      ctx.globalAlpha = P.alphaContour * breathe;
      ctx.drawImage(contourCanvas, 0, 0);
      ctx.restore();
    } else if (renderMode === 'heat') {
      ctx.save();
      ctx.globalAlpha = P.alphaHeat * breathe;
      ctx.drawImage(heatCanvas, 0, 0);
      ctx.restore();
    } else if (renderMode === 'mixed') {
      ctx.save();
      ctx.globalAlpha = P.alphaHeat * breathe;
      ctx.drawImage(heatCanvas, 0, 0);
      ctx.restore();
      ctx.save();
      ctx.globalAlpha = P.alphaContour * breathe;
      ctx.drawImage(contourCanvas, 0, 0);
      ctx.restore();
    }
  }

  if (renderMode === 'debug') drawSiteDots();

  requestAnimationFrame(loop);
}

function drawSiteDots() {
  if (!bgW) return;
  ctx.save();
  const debug = renderMode === 'debug';
  for (const ds of datasets) {
    for (let i=0; i<ds.latlon.length; i++) {
      const w = debug ? 1 : ds.weights[i];
      if (w <= 0) continue;
      const {lat, lon} = ds.latlon[i];
      const [cx, cy] = latLonToCanvas(lon, lat);
      ctx.globalAlpha = debug ? 0.75 : 0.6 * w;
      ctx.fillStyle = debug ? ds.color : ds.color;
      ctx.shadowBlur = debug ? 0 : 8 * w;
      ctx.beginPath(); ctx.arc(cx, cy, debug ? 2 : 3 * w, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
}

loop();

// ─── Default dataset ──────────────────────────────────────────────────────────
fetch('./Tradicao Inciso Ponteada.csv')
  .then(r => r.text())
  .then(txt => addDataset('Tradicao Inciso Ponteada.csv', txt))
  .catch(() => {}); // silently skip if not found

// ─── CSV Parsing ─────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const header = lines[0].split(',').map(h => h.trim().replace(/^["']|["']$/g,''));
  const xCol = header.findIndex(h => /proj_x/i.test(h) || /^x_proj$/i.test(h));
  const yCol = header.findIndex(h => /proj_y/i.test(h) || /^y_proj$/i.test(h));
  if (xCol<0||yCol<0) return null;

  const latlon = [];
  for (let i=1;i<lines.length;i++) {
    const cols = lines[i].split(',');
    const xv = parseFloat(cols[xCol]), yv = parseFloat(cols[yCol]);
    if (isNaN(xv)||isNaN(yv)) continue;
    latlon.push(projToLatLon(xv, yv));
  }
  return latlon;
}

function addDataset(name, text) {
  const parsed = parseCSV(text);
  if (!parsed||!parsed.length) { alert(`No valid proj_x/proj_y data found in "${name}".`); return; }

  const color = PALETTE_COLORS[datasets.length % PALETTE_COLORS.length];
  const phase = new Float32Array(parsed.length);
  for (let i = 0; i < phase.length; i++) phase[i] = Math.random() * Math.PI * 2;
  const ds = {
    name: name.replace(/\.csv$/i,'').slice(0,30),
    color,
    latlon: parsed,
    weights: new Float32Array(parsed.length),
    phase,
  };
  datasets.push(ds);
  renderDatasetTag(ds);
  resetReveal();
}

function removeDataset(ds) {
  const idx = datasets.indexOf(ds);
  if (idx >= 0) datasets.splice(idx, 1);
  rebuildTags();
  // Show remaining datasets at full weight
  for (const d of datasets) d.weights.fill(1);
  globalRevealFrame = 999999;
  revealActive = false;
  freezeActive = false;
  fadedOut = false;
  fadeOutAlpha = 1.0;
  paused = true;
  btnPlay.textContent = '▶';
  btnPlay.classList.remove('active');
  needsRebuild = true;
}

function rebuildTags() {
  const container = document.getElementById('datasetTags');
  container.innerHTML = '';
  datasets.forEach(ds => renderDatasetTag(ds, container));
}

function renderDatasetTag(ds, container) {
  container = container || document.getElementById('datasetTags');

  const tag  = document.createElement('div');
  tag.className = 'dataset-tag';

  const dot  = document.createElement('div');
  dot.className = 'dot';
  dot.style.background = ds.color;

  const name = document.createElement('span');
  name.className = 'name';
  name.textContent = ds.name;

  const rm   = document.createElement('span');
  rm.className = 'rm';
  rm.textContent = '×';
  rm.addEventListener('click', () => removeDataset(ds));

  tag.appendChild(dot);
  tag.appendChild(name);
  tag.appendChild(rm);
  container.appendChild(tag);
}

function resetReveal() {
  globalRevealFrame = 0;
  revealActive = false;
  freezeActive = false;
  fadedOut = false;
  fadeOutAlpha = 1.0;
  paused = true;
  for (const ds of datasets) ds.weights.fill(0);
  btnPlay.textContent = '▶';
  btnPlay.classList.remove('active');
  needsRebuild = true;
}

function startReveal() {
  if (datasets.length===0) return;
  revealActive = true;
  paused = false;
  btnPlay.textContent = '⏸';
  btnPlay.classList.add('active');
}

function skipToEnd() {
  updateWeights(999999);
  revealActive = false;
  paused = true;
  btnPlay.textContent = '▶';
  btnPlay.classList.remove('active');
  if (freezeMode) freezeActive = true;
  needsRebuild = true;
}

// ─── File loading ─────────────────────────────────────────────────────────────
document.getElementById('btnLoad').addEventListener('click', () => document.getElementById('csvInput').click());
document.getElementById('csvInput').addEventListener('change', function() {
  Array.from(this.files).forEach(file => {
    const reader = new FileReader();
    reader.onload = e => addDataset(file.name, e.target.result);
    reader.readAsText(file);
  });
  this.value = '';
});

// Drag and drop
document.addEventListener('dragenter', e => { e.preventDefault(); document.body.classList.add('dragging'); });
document.addEventListener('dragleave', e => { if (e.clientX===0&&e.clientY===0) document.body.classList.remove('dragging'); });
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => {
  e.preventDefault(); document.body.classList.remove('dragging');
  Array.from(e.dataTransfer.files).filter(f=>f.name.endsWith('.csv')).forEach(file => {
    const reader = new FileReader();
    reader.onload = ev => addDataset(file.name, ev.target.result);
    reader.readAsText(file);
  });
});

// ─── Controls ─────────────────────────────────────────────────────────────────
const btnPlay = document.getElementById('btnPlay');
btnPlay.addEventListener('click', () => {
  if (!freezeMode) {
    // 0× mode: skip straight to the settled end state
    skipToEnd();
    return;
  }

  // 1× mode: play reveal then breathe
  if (!revealActive && globalRevealFrame === 0) {
    startReveal(); // fresh start
  } else if (!paused) {
    paused = true;
    btnPlay.textContent = '▶';
    btnPlay.classList.remove('active');
  } else if (revealActive) {
    paused = false;
    btnPlay.textContent = '⏸';
    btnPlay.classList.add('active');
  } else {
    resetReveal(); // replay from beginning
    startReveal();
  }
});

document.getElementById('btnReset').addEventListener('click', () => resetReveal());

const btnOneShot = document.getElementById('btnOneShot');
const btnFreeze  = document.getElementById('btnFreeze');

btnOneShot.addEventListener('click', () => {
  freezeMode = true; // reveal then breathe
  btnOneShot.classList.add('active');
  btnFreeze.classList.remove('active');
});

btnFreeze.addEventListener('click', () => {
  freezeMode = false; // skip to end and hold
  freezeActive = false;
  btnFreeze.classList.add('active');
  btnOneShot.classList.remove('active');
});

function wire(id, valId, key, fmt) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    P[key] = parseFloat(sl.value);
    vl.textContent = fmt(P[key]);
    needsRebuild = true;
  });
  vl.textContent = fmt(P[key]);
}

wire('sRadius',    'vRadius',    'radius',    v => `${v}`);
wire('sIntensity', 'vIntensity', 'intensity', v => `${v.toFixed(1)}`);
wire('sSpeed',     'vSpeed',     'speed',     v => `${v.toFixed(1)}×`);

document.getElementById('sAlphaHeat').addEventListener('input', function () {
  P.alphaHeat = parseFloat(this.value);
  document.getElementById('vAlphaHeat').textContent = Math.round(P.alphaHeat * 100) + '%';
});

document.getElementById('sBandHeat').addEventListener('input', function () {
  P.bandHeat = parseFloat(this.value);
  document.getElementById('vBandHeat').textContent = P.bandHeat;
  needsRebuild = true;
});

document.getElementById('sAlphaContour').addEventListener('input', function () {
  P.alphaContour = parseFloat(this.value);
  document.getElementById('vAlphaContour').textContent = Math.round(P.alphaContour * 100) + '%';
});

document.getElementById('sBandContour').addEventListener('input', function () {
  P.bandContour = parseFloat(this.value);
  document.getElementById('vBandContour').textContent = P.bandContour.toFixed(1);
  needsRebuild = true;
});

document.getElementById('sBgOp').addEventListener('input', function () {
  bgOpacity = parseFloat(this.value);
  document.getElementById('vBgOp').textContent = Math.round(bgOpacity * 100) + '%';
});



// ─── Render mode toggle ───────────────────────────────────────────────────────
const btnHeat    = document.getElementById('btnHeat');
const btnContour = document.getElementById('btnContour');
const btnMixed   = document.getElementById('btnMixed');
const btnDebug   = document.getElementById('btnDebug');
function setRenderMode(mode) {
  renderMode = mode;
  btnHeat.classList.toggle('active',    mode === 'heat');
  btnContour.classList.toggle('active', mode === 'contour');
  btnMixed.classList.toggle('active',   mode === 'mixed');
  btnDebug.classList.toggle('active',   mode === 'debug');
  needsRebuild = true;
}
btnHeat.addEventListener('click',    () => setRenderMode('heat'));
btnContour.addEventListener('click', () => setRenderMode('contour'));
btnMixed.addEventListener('click',   () => setRenderMode('mixed'));
btnDebug.addEventListener('click',   () => setRenderMode('debug'));

// ─── Video recording ──────────────────────────────────────────────────────────
let mediaRecorder = null, recChunks = [];
const btnRecord = document.getElementById('btnRecord');

btnRecord.addEventListener('click', () => {
  if (mediaRecorder) {
    mediaRecorder.stop();
    return;
  }

  const mimeType = ['video/mp4', 'video/webm;codecs=vp9', 'video/webm']
    .find(m => MediaRecorder.isTypeSupported(m)) || 'video/webm';

  const stream = canvas.captureStream(60);
  mediaRecorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 12_000_000 });
  recChunks = [];

  mediaRecorder.ondataavailable = e => {
    if (e.data.size > 0) recChunks.push(e.data);
  };

  mediaRecorder.onstop = () => {
    const ext  = mimeType.includes('mp4') ? 'mp4' : 'webm';
    const blob = new Blob(recChunks, { type: mimeType });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = `heatmap.${ext}`;
    a.click();
    URL.revokeObjectURL(url);
    mediaRecorder = null;
    btnRecord.classList.remove('recording');
  };

  mediaRecorder.start();
  btnRecord.classList.add('recording');
});

function exportPNG() {
  canvas.toBlob(blob => {
    const a = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `heatmap-${Date.now()}.png`;
    a.click();
    URL.revokeObjectURL(a.href);
  }, 'image/png');
}
document.getElementById('btnExport').addEventListener('click', exportPNG);

// ─── Keyboard shortcuts ───────────────────────────────────────────────────────
const panel  = document.getElementById('panel');
const hint   = document.getElementById('hint');
const topBar = document.getElementById('topBar');

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  if (e.key === ' ')     { btnPlay.click(); e.preventDefault(); }
  if (e.key === 'Enter') { skipToEnd(); }

  if (key === 'r') { resetReveal(); }
  if (key === 'e') { exportPNG(); }
  if (key === 'v') { btnRecord.click(); }
  if (key === 'm') { bgVisible = !bgVisible; }

  if (key === 'h') {
    uiVisible = !uiVisible;
    panel.classList.toggle('hidden', !uiVisible);
    hint.classList.toggle('hidden', !uiVisible);
    topBar.style.display = uiVisible ? '' : 'none';
  }
});

document.getElementById('hint').classList.remove('hidden');
document.getElementById('panel').classList.remove('hidden');

window.addEventListener('resize', () => {
  W = canvas.width  = Math.min(window.innerWidth,  1920);
  H = canvas.height = Math.min(window.innerHeight, 1080);
  bgW = 0;
  initBg();
  contourCanvas.width  = W;
  contourCanvas.height = H;
  contourImg = contourCtx.createImageData(W, H);
  needsRebuild = true;
});
</script>
